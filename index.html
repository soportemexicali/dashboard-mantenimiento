<!-- ... (Mantén tu <head> igual) ... -->

<!-- Dentro del Nav (Selector de Tabs), agrega esta línea -->
<button onclick="switchTab('agenda')" id="tab-agenda" class="tab-btn border-b-2 border-transparent text-slate-500 hover:text-slate-800 py-4 px-1 font-semibold text-sm tracking-wide flex items-center gap-2 transition">
    <i data-lucide="calendar" class="w-4 h-4"></i>
    AGENDA DE MANTTO
</button>

<!-- ... (En tu <main>, después del grid de KPIs, agrega la sección de Agenda) ... -->

<!-- Seccion oculta/visible dependiendo del tab -->
<section id="content-agenda" class="hidden bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
    <div class="flex items-center gap-2.5 mb-6 border-b border-slate-100 pb-3">
        <div class="p-1.5 bg-indigo-50 text-indigo-600 rounded-lg">
            <i data-lucide="calendar-plus" class="w-5 h-5"></i>
        </div>
        <h2 class="text-base font-bold text-slate-900">Programar Nuevo Mantenimiento</h2>
    </div>
    
    <form id="schedule-form" onsubmit="handleSchedule(event)" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <input type="date" id="sched-date" class="bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm" required />
        <input type="text" id="sched-agency" placeholder="Agencia o Depto" class="bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm" required />
        <input type="text" id="sched-desc" placeholder="Detalle (Ej. Limpieza, Update)" class="bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm col-span-1 md:col-span-1" required />
        <button type="submit" class="bg-indigo-600 text-white text-sm font-bold rounded-lg hover:bg-indigo-700">Guardar Cita</button>
    </form>

    <div class="overflow-x-auto">
        <table class="w-full text-left">
            <thead class="bg-slate-50 text-slate-400 text-[11px] uppercase">
                <tr>
                    <th class="py-3 px-4">Fecha</th>
                    <th class="py-3 px-4">Agencia</th>
                    <th class="py-3 px-4">Detalle</th>
                    <th class="py-3 px-4">Acción</th>
                </tr>
            </thead>
            <tbody id="agenda-table-body" class="divide-y divide-slate-100"></tbody>
        </table>
    </div>
</section>

<!-- ... (En tu Script, añade la lógica) ... -->

<script>
    // 1. Inicializa la agenda en tu estado
    if (!state.agenda) state.agenda = [];

    function handleSchedule(e) {
        e.preventDefault();
        const nuevaCita = {
            id: Date.now(),
            fecha: document.getElementById('sched-date').value,
            agencia: document.getElementById('sched-agency').value,
            desc: document.getElementById('sched-desc').value
        };
        state.agenda.push(nuevaCita);
        saveState();
        document.getElementById('schedule-form').reset();
        renderAgenda();
    }

    function renderAgenda() {
        const tbody = document.getElementById('agenda-table-body');
        tbody.innerHTML = state.agenda.sort((a,b) => new Date(a.fecha) - new Date(b.fecha)).map(cita => `
            <tr>
                <td class="py-3 px-4 font-bold text-slate-700">${cita.fecha}</td>
                <td class="py-3 px-4 text-sm">${cita.agencia}</td>
                <td class="py-3 px-4 text-sm">${cita.desc}</td>
                <td class="py-3 px-4">
                    <button onclick="deleteCita(${cita.id})" class="text-red-500 hover:text-red-700">Eliminar</button>
                </td>
            </tr>
        `).join('');
    }

    function deleteCita(id) {
        state.agenda = state.agenda.filter(c => c.id !== id);
        saveState();
        renderAgenda();
    }

    // Actualiza tu switchTab para mostrar/ocultar la nueva sección
    function switchTab(agencyKey) {
        // Esconde todo
        document.getElementById('agency-content').classList.toggle('hidden', agencyKey === 'agenda');
        document.getElementById('content-agenda').classList.toggle('hidden', agencyKey !== 'agenda');
        
        // ... (resto de tu lógica de switchTab original)
        if(agencyKey === 'agenda') renderAgenda();
    }
</script>
